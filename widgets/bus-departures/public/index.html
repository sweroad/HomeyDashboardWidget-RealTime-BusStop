<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bus Departures</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:        transparent;
      --color-text:      #1a1a1a;
      --color-subtext:   #666;
      --color-line-bg:   #1565C0;
      --color-line-text: #fff;
      --color-delay-ok:  #2e7d32;
      --color-delay-warn:#e65100;
      --color-delay-bad: #b71c1c;
      --color-cancelled: #b71c1c;
      --color-divider:   rgba(0,0,0,0.08);
      --color-badge-bg:  rgba(0,0,0,0.06);
      --row-height:      48px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-text:     #f0f0f0;
        --color-subtext:  #999;
        --color-divider:  rgba(255,255,255,0.08);
        --color-badge-bg: rgba(255,255,255,0.08);
      }
    }

    body {
      font-family: var(--font);
      color: var(--color-text);
      background: var(--color-bg);
      padding: 12px 14px 8px;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 24px;
    }

    #stop-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    #status-badge {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 99px;
      background: var(--color-badge-bg);
      color: var(--color-subtext);
      white-space: nowrap;
      margin-left: 8px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #status-badge.visible { opacity: 1; }

    /* ── Departure list ── */
    #list {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .departure {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      align-items: center;
      gap: 10px;
      height: var(--row-height);
      border-bottom: 1px solid var(--color-divider);
      flex-shrink: 0;
    }
    .departure:last-child { border-bottom: none; }

    .line-badge {
      background: var(--color-line-bg);
      color: var(--color-line-text);
      font-size: 13px;
      font-weight: 700;
      border-radius: 6px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      padding: 0 4px;
    }
    .departure.cancelled .line-badge {
      background: var(--color-cancelled);
      opacity: 0.7;
    }

    .dest {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .departure.cancelled .dest { text-decoration: line-through; opacity: 0.5; }

    .time-col {
      text-align: right;
      flex-shrink: 0;
    }

    .time-main {
      font-size: 14px;
      font-weight: 700;
      display: block;
    }
    .time-delay {
      font-size: 10px;
      font-weight: 500;
      display: block;
      margin-top: 1px;
    }
    .delay-ok   { color: var(--color-delay-ok); }
    .delay-warn { color: var(--color-delay-warn); }
    .delay-bad  { color: var(--color-delay-bad); }

    /* ── Empty / error states ── */
    #empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--color-subtext);
      text-align: center;
    }

    /* ── Spinner ── */
    #spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--color-divider);
      border-top-color: var(--color-line-bg);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    #footer {
      font-size: 10px;
      color: var(--color-subtext);
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body class="homey-widget">
  <div id="header">
    <span id="stop-name">…</span>
    <span id="status-badge"></span>
  </div>

  <div id="list">
    <div id="empty"><div id="spinner"></div></div>
  </div>

  <div id="footer"></div>

  <script src="./bus-departures.js"></script>
</body>
</html>
